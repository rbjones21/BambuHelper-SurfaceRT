<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BambuHelperRT</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  /* ── Base variables ── */
  :root {
    --bg:    #0a0c0f;
    --panel: #0f1318;
    --bdr:   #1a2030;
    --text:  #e8edf5;
    --muted: #3a4560;
    --track: #141820;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100vw; height: 100vh;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
  }
  #root { display: grid; grid-template-rows: 52px 1fr; height: 100vh; position: relative; }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--bdr);
  }
  .logo    { font-size: 24px; font-weight: 700; letter-spacing: 3px; color: #00c8ff; }
  .logo em { color: var(--text); font-style: normal; }
  .hdr-r   { display: flex; align-items: center; gap: 16px; }
  .clock   { font-family: 'Share Tech Mono', monospace; font-size: 20px; color: var(--muted); letter-spacing: 2px; }
  .cfg-btn {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--bdr);
    padding: 4px 12px;
    border-radius: 4px;
  }

  /* ── Network status indicator ── */
  .net-status { display: flex; align-items: center; gap: 6px; font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--muted); }
  .net-dot    { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: all 0.4s; }
  .net-dot.ok { background: #00ff88; box-shadow: 0 0 5px #00ff8880; }
  .net-dot.err{ background: #ff3344; box-shadow: 0 0 5px #ff334480; }
  .net-label  { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }

  /* ── Printer grid ── */
  #printers { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; overflow: hidden; }

  /* ── Panel (per-printer card) ── */
  .pnl          { background: var(--panel); border: 1px solid var(--bdr); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; position: relative; transition: border-color 0.4s; }
  .pnl.printing { border-color: var(--ac); box-shadow: inset 0 0 0 1px var(--ac); }
  @keyframes flash-err { 0%,100%{ border-color:#ff2244; box-shadow:inset 0 0 0 1px #ff2244; } 50%{ border-color:#ff5566; box-shadow:inset 0 0 0 1px #ff5566, 0 0 14px #ff224428; } }
  @keyframes pulse-err  { 0%,100%{ opacity:.92; } 50%{ opacity:.75; } }
  @keyframes pulse-warn { 0%,100%{ opacity:.92; } 50%{ opacity:.72; } }
  .pnl.error  { animation: flash-err 2s ease-in-out infinite; }
  /* State overlay */
  .pnl-body    { position:relative; flex:1; min-height:0; display:flex; flex-direction:column; overflow:hidden; }
  .pnl-overlay { position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; border-radius:8px 8px 0 0; pointer-events:none; }
  .pnl-overlay.error  { background:rgba(180,10,30,0.55); animation:pulse-err  2.5s ease-in-out infinite; }
  .pnl-overlay.paused { background:rgba(180,120,0,0.50); animation:pulse-warn 2.5s ease-in-out infinite; }
  .pnl-overlay-icon  { font-size:48px; line-height:1; }
  .pnl-overlay-lbl   { font-size:22px; font-weight:800; letter-spacing:3px; text-transform:uppercase; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,0.6); }
  .pnl-overlay-codes { display:flex; flex-direction:column; align-items:center; gap:6px; margin-top:8px; }
  .pnl-overlay-code  { font-family:'Share Tech Mono',monospace; font-size:15px; color:#fff; letter-spacing:1.5px; background:rgba(0,0,0,0.45); border:1px solid rgba(255,255,255,0.25); border-radius:5px; padding:6px 14px; pointer-events:auto; cursor:pointer; }
  .pnl-overlay-code:hover { background:rgba(0,0,0,0.65); border-color:rgba(255,255,255,0.5); }
  .pnl-overlay-code-desc { font-family:'Rajdhani',sans-serif; font-size:11px; color:rgba(255,255,255,0.7); letter-spacing:0.5px; margin-top:2px; text-transform:none; }
  .pnl-overlay-hint  { font-size:10px; color:rgba(255,255,255,0.5); letter-spacing:1px; margin-top:-2px; }

  /* Panel header row */
  .pnl-hdr  { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; border-bottom: 1px solid var(--bdr); flex-shrink: 0; }
  .pnl-name { font-size: 22px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--ac); }
  .pnl-dot      { width: 10px; height: 10px; border-radius: 50%; }
  .pnl-dot.ok   { background: #00ff88; box-shadow: 0 0 5px #00ff8880; }
  .pnl-dot.err  { background: #ff3344; box-shadow: 0 0 5px #ff334480; }
  .pnl-dot.warn { background: #ffcc00; box-shadow: 0 0 5px #ffcc0080; }
  .pnl-dot.off  { background: var(--muted); }

  /* Status badge */
  .badge          { font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 3px 10px; border-radius: 3px; border: 1px solid currentColor; }
  .badge.printing { color: #00ff88; }
  .badge.paused   { color: #ffcc00; }
  .badge.finished { color: #00c8ff; }
  .badge.error    { color: #ff3344; }
  .badge.idle     { color: var(--muted); }
  .badge.offline  { color: var(--muted); }

  /* ── Print info card ── */
  .print-card  { display: flex; align-items: center; gap: 14px; padding: 10px 16px; border-bottom: 1px solid var(--bdr); flex-shrink: 0; background: rgba(255,255,255,0.02); }
  .thumb       { width: 64px; height: 64px; border-radius: 6px; background: var(--track); border: 1px solid var(--bdr); display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; font-size: 32px; }
  .thumb img   { width: 100%; height: 100%; object-fit: cover; border-radius: 5px; }
  .print-info  { flex: 1; min-width: 0; }
  .print-title { font-size: 16px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.5px; }
  .print-meta  { display: flex; gap: 16px; margin-top: 4px; font-family: 'Share Tech Mono', monospace; font-size: 16px; color: var(--muted); flex-wrap: wrap; }
  .print-meta span strong { color: var(--text); }
  .print-stage { font-size: 16px; font-weight: 600; color: var(--text); margin-top: 4px; letter-spacing: 0.5px; }

  /* ETA block */
  .eta-block { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 72px; flex-shrink: 0; gap: 2px; }
  .eta-time  { font-size: 22px; font-weight: 700; letter-spacing: 1px; color: var(--ac, #00c8ff); line-height: 1; font-family: 'Share Tech Mono', monospace; }
  .eta-label { font-size: 22px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

  /* ── Progress LED bar ── */
  .led-sect  { padding: 5px 14px 4px; flex-shrink: 0; }
  .led-row1  { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  .led-fn    { font-family: 'Share Tech Mono', monospace; font-size: 14px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 66%; }
  .led-pct   { font-family: 'Share Tech Mono', monospace; font-size: 32px; font-weight: 700; color: var(--text); line-height: 1; }
  .led-pct sup { font-size: 16px; color: var(--muted); font-weight: 400; }
  .led-strip { display: flex; gap: 2px; height: 12px; }
  .seg       { flex: 1; border-radius: 2px; background: var(--track); transition: background 0.5s; }
  .seg.on    { background: var(--ac); }
  .seg.tip   { animation: tip 1s ease-in-out infinite; }
  @keyframes tip { 0%,100%{opacity:1} 50%{opacity:0.35} }

  /* ── Gauge grid — 3 cols (6 in single mode) ── */
  .gg  { display: grid; grid-template-columns: repeat(3, 1fr); grid-auto-rows: 1fr; gap: 5px; padding: 3px 8px; flex: 1; min-height: 0; overflow: hidden; }
  .gc  { background: var(--track); border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; gap: 3px; padding: 3px 4px 5px; overflow: hidden; min-height: 0; }
  .gc-lbl { font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text); }

  /* Arc gauge */
  .arc-box     { position: relative; width: 85%; }
  .arc-box svg { width: 100%; height: auto; display: block; }
  .arc-over    { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
  .arc-v       { font-family: 'Share Tech Mono', monospace; font-size: clamp(18px, 2.8vw, 30px); font-weight: 700; color: var(--text); line-height: 1; }
  .arc-u       { font-size: clamp(11px, 1.4vw, 14px); color: var(--muted); }
  .arc-tgt     { font-family: 'Share Tech Mono', monospace; font-size: clamp(10px, 1.2vw, 13px); color: var(--muted); }

  /* ── AMS tray strip ── */
  .ams-sect       { padding: 3px 10px 4px; border-top: 1px solid var(--bdr); flex-shrink: 0; }
  .ams-unit       { margin-bottom: 3px; }
  .ams-unit-hdr   { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
  .ams-unit-lbl   { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text); font-weight: 700; display: flex; align-items: center; gap: 5px; }
  @keyframes pulse-dry { 0%,100%{ opacity:1; box-shadow:0 0 4px #ff8c0088; } 50%{ opacity:0.6; box-shadow:0 0 8px #ff8c00aa; } }
  .ams-dry-badge  { font-size: 8px; background: rgba(255,140,0,0.15); color: #ff8c00; border: 1px solid rgba(255,140,0,0.45); border-radius: 3px; padding: 1px 5px; letter-spacing: 1.5px; animation: pulse-dry 1.8s ease-in-out infinite; }
  .ams-trays      { display: flex; gap: 4px; }
  .ams-tray       { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1px; min-width: 0; }
  .ams-color      { width: 100%; height: 11px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.2); }
  .ams-arrow      { font-size: 10px; line-height: 1; visibility: hidden; }
  .ams-arrow.on   { visibility: visible; }
  .ams-info       { font-size: 13px; color: var(--muted); font-family: 'Share Tech Mono', monospace; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; line-height: 1.3; }
  .ams-nozzle     { display: flex; align-items: center; gap: 6px; border-top: 1px solid var(--bdr); margin-top: 3px; padding-top: 3px; flex-wrap: wrap; }
  .ams-nozzle-slot{ display: flex; align-items: center; gap: 3px; }
  .ams-nozzle-dot { width: 9px; height: 9px; border-radius: 50%; border: 1px solid rgba(128,128,128,0.35); flex-shrink: 0; }
  .ams-nozzle-lbl { font-size: 11px; color: var(--muted); font-family: 'Share Tech Mono', monospace; }

  /* ── Error strip ── */
  .err-strip { padding: 5px 14px; background: rgba(255,34,68,0.1); border-top: 1px solid rgba(255,34,68,0.2); font-size: 13px; color: #ff4455; font-family: 'Share Tech Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }

  /* ── Vertical bar gauge (nozzle) ── */
  .vg-outer { flex: 1; display: flex; justify-content: center; align-items: stretch; width: 100%; min-height: 0; padding: 2px 0; }
  .vg-bar   { width: 26px; background: rgba(255,255,255,.05); border-radius: 4px; position: relative; overflow: hidden; min-height: 0; }
  .vg-fill  { position: absolute; bottom: 0; left: 0; right: 0; border-radius: 4px; transition: height 0.5s; }
  .vg-mark  { position: absolute; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.55); border-radius: 1px; }
  .vg-val   { font-family: 'Share Tech Mono', monospace; font-size: clamp(14px, 2vw, 22px); font-weight: 700; color: var(--text); line-height: 1; }
  .vg-sub   { font-family: 'Share Tech Mono', monospace; font-size: clamp(10px, 1.2vw, 13px); color: var(--muted); line-height: 1; }
  .vg-col   { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; min-height: 0; }
  .vg-col .vg-bar { flex: 1; width: 20px; }
  .vg-dots  { display: flex; gap: 4px; justify-content: center; }
  .vg-dot   { width: 9px; height: 9px; border-radius: 50%; border: 1px solid rgba(128,128,128,0.35); }
  #printers.single .vg-bar { width: 38px; }
  #printers.single .vg-val { font-size: clamp(18px, 2.4vw, 28px) !important; }
  #printers.single .vg-sub { font-size: clamp(12px, 1.4vw, 15px) !important; }

  /* ── HMS error codes ── */
  .hms-strip      { padding: 4px 14px; background: rgba(255,34,68,0.06); border-top: 1px solid rgba(255,34,68,0.12); display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; position: relative; z-index: 11; }
  .hms-strip-row  { display: flex; align-items: center; gap: 8px; }
  .hms-entry      { display: flex; align-items: center; gap: 8px; cursor: pointer; border-radius: 3px; padding: 2px 4px; flex: 1; min-width: 0; }
  .hms-entry:hover { background: rgba(255,34,68,0.10); }
  .hms-desc       { font-size: 13px; color: #ff4455; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hms-code       { font-size: 10px; color: rgba(255,102,119,0.6); font-family: 'Share Tech Mono', monospace; white-space: nowrap; flex-shrink: 0; }
  /* QR overlay */
  #qr-overlay     { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 999; align-items: center; justify-content: center; }
  #qr-overlay.vis { display: flex; }
  #qr-box         { background: #1a2035; border: 1px solid rgba(255,34,68,0.35); border-radius: 10px; padding: 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  #qr-code-lbl    { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: #ff6677; letter-spacing: 1px; }
  #qr-desc-lbl    { font-family: 'Rajdhani', sans-serif; font-size: 14px; color: var(--text); text-align: center; max-width: 220px; line-height: 1.4; }
  #qr-img         { width: 180px; height: 180px; border-radius: 4px; background: #fff; }
  #qr-close       { font-size: 12px; color: var(--muted); cursor: pointer; padding: 4px 12px; border: 1px solid var(--bdr); border-radius: 4px; background: none; margin-top: 2px; }
  #qr-close:hover { color: var(--text); }
  .hms-dismiss    { margin-left: auto; font-size: 14px; color: rgba(255,100,119,0.6); cursor: pointer; padding: 0 4px; line-height: 1; border: none; background: none; }
  .hms-dismiss:hover { color: #ff6677; }

  /* ── AMS environment (temp/humidity header) ── */
  .ams-env  { font-size: 12px; color: var(--muted); font-family: 'Share Tech Mono', monospace; text-align: right; margin-top: 1px; letter-spacing: 0.5px; }

  /* ── Battery indicator ── */
  .batt-status          { display: flex; align-items: center; gap: 5px; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--muted); }
  .batt-bar             { width: 20px; height: 10px; border: 1.5px solid currentColor; border-radius: 2px; padding: 1px; position: relative; }
  .batt-bar::after      { content: ''; position: absolute; right: -4px; top: 50%; transform: translateY(-50%); width: 3px; height: 5px; background: currentColor; border-radius: 0 1px 1px 0; }
  .batt-fill            { height: 100%; border-radius: 1px; background: currentColor; transition: width 0.5s; }
  .batt-status.charging { color: #00ff88; }
  .batt-status.low      { color: #ff3344; }

  /* ── Single printer mode — expand everything ── */
  #printers.single .pnl-name    { font-size: 32px; }
  #printers.single .pnl-dot     { width: 13px; height: 13px; }
  #printers.single .badge       { font-size: 18px; padding: 5px 16px; }
  #printers.single .print-card  { padding: 12px 24px; gap: 20px; }
  #printers.single .thumb       { width: 88px; height: 88px; font-size: 44px; }
  #printers.single .print-title { font-size: 22px; }
  #printers.single .print-meta  { font-size: 20px; gap: 24px; }
  #printers.single .print-stage { font-size: 20px; }
  #printers.single .eta-time    { font-size: 32px; }
  #printers.single .eta-label   { font-size: 28px; }
  #printers.single .led-sect    { padding: 8px 20px 6px; }
  #printers.single .led-fn      { font-size: 16px; }
  #printers.single .led-pct     { font-size: 42px; }
  #printers.single .led-pct sup { font-size: 20px; }
  #printers.single .led-strip   { height: 16px; }
  #printers.single .gg          { grid-template-columns: repeat(6, 1fr); grid-auto-rows: 1fr; gap: 8px; padding: 8px 12px; }
  #printers.single .gc-lbl      { font-size: 17px; }
  #printers.single .arc-v       { font-size: clamp(22px, 3vw, 36px) !important; }
  #printers.single .arc-u       { font-size: clamp(13px, 1.6vw, 18px) !important; }
  #printers.single .arc-tgt     { font-size: clamp(11px, 1.3vw, 15px) !important; }
  #printers.single .ams-color      { height: 16px; }
  #printers.single .ams-info       { font-size: 15px; }
  #printers.single .ams-env        { font-size: 14px; }
  #printers.single .ams-nozzle-lbl { font-size: 13px; }
  #printers.single .ams-nozzle-dot { width: 11px; height: 11px; }

  /* ── Idle clock overlay (shown when no active prints) ── */
  #idle-clock {
    display: none;
    position: absolute; inset: 52px 0 0 0;
    flex-direction: column; align-items: center; justify-content: center;
    background: var(--bg); gap: 12px; z-index: 10;
  }
  #idle-clock.active { display: flex; }
  .idle-time   { font-family: 'Share Tech Mono', monospace; font-size: clamp(80px, 15vw, 140px); font-weight: 700; color: var(--text); letter-spacing: 4px; line-height: 1; }
  .idle-date   { font-family: 'Rajdhani', sans-serif; font-size: clamp(24px, 4vw, 42px); font-weight: 500; color: var(--muted); letter-spacing: 4px; text-transform: uppercase; }
  .idle-status { font-size: 14px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); opacity: 0.5; margin-top: 8px; }
  #idle-weather { display:flex; align-items:baseline; gap:18px; margin-top:4px; flex-wrap:wrap; justify-content:center; }
  .wx-temp  { font-family:'Rajdhani',sans-serif; font-size:clamp(36px,6vw,64px); font-weight:700; color:var(--text); line-height:1; }
  .wx-desc  { font-size:clamp(13px,2vw,18px); color:var(--muted); letter-spacing:2px; text-transform:uppercase; }
  .wx-range { font-size:13px; color:var(--muted); opacity:0.6; letter-spacing:1px; }

  /* ── Offline overlay ── */
  .offline     { position: absolute; inset: 0; background: rgba(10,12,15,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; border-radius: 8px; z-index: 9; }
  .offline .on { font-size: 20px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
  .offline .om { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); opacity: 0.5; }
  .dots        { display: flex; gap: 6px; }
  .dots span   { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: dp 1.4s ease-in-out infinite; }
  .dots span:nth-child(2) { animation-delay: .2s; }
  .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes dp { 0%,80%,100%{ opacity:.15; transform:scale(.8); } 40%{ opacity:1; transform:scale(1.1); } }
</style>
</head>
<body>
<div id="qr-overlay" onclick="hideHmsQR()">
  <div id="qr-box" onclick="event.stopPropagation()">
    <div id="qr-code-lbl"></div>
    <div id="qr-desc-lbl"></div>
    <img id="qr-img" src="" alt="QR Code"/>
    <button id="qr-close" onclick="hideHmsQR()">Close</button>
  </div>
</div>
<div id="root">
  <header>
    <div class="logo">BambuHelper<em>RT</em></div>
    <div class="hdr-r">
      <div class="batt-status" id="batt-status" style="display:none">
        <div class="batt-bar"><div class="batt-fill" id="batt-fill" style="width:100%"></div></div>
        <span id="batt-pct">--%</span>
      </div>
      <div class="net-status" id="net-status">
        <div class="net-dot" id="net-dot"></div>
        <span class="net-label" id="net-label">Network</span>
      </div>
      <div class="clock" id="clk">--:--:--</div>
      <button class="cfg-btn" onclick="location.reload()">↺</button>
      <a href="/settings" class="cfg-btn">⚙ Settings</a>
    </div>
  </header>
  <div id="token-warn-bar" style="display:none;background:#7a3a00;border-bottom:1px solid #ff9944;padding:8px 16px;display:none;align-items:center;gap:12px;flex-wrap:wrap">
    <span style="color:#ff9944;font-size:13px;flex:1" id="token-warn-msg"></span>
    <a href="/settings" style="background:#ff9944;color:#000;font-size:12px;font-weight:700;padding:5px 12px;border-radius:5px;text-decoration:none;white-space:nowrap">Update Token →</a>
  </div>
  <div id="printers"></div>
  <div id="idle-clock">
    <div class="idle-time" id="idle-time-display">--:--</div>
    <div class="idle-date" id="idle-date-display">---</div>
    <div class="idle-status">No active prints</div>
    <div id="idle-weather" style="display:none">
      <span class="wx-temp" id="wx-temp"></span>
      <div>
        <div class="wx-desc" id="wx-desc"></div>
        <div class="wx-range" id="wx-range"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── Default display colours — overridden by /api/display ──────────────────
const DEFAULT_COLORS = {
  bg:       '#0a0c0f',
  track:    '#141820',
  progress: { arc: '#00c8ff', glabel: '#00c8ff', value: '#e8edf5' },
  nozzle:   { arc: '#00c8ff', glabel: '#00c8ff', value: '#e8edf5' },
  bed:      { arc: '#ff9944', glabel: '#ff9944', value: '#e8edf5' },
  fan_part: { arc: '#00c8ff', glabel: '#00c8ff', value: '#e8edf5' },
  fan_aux:  { arc: '#44aaff', glabel: '#44aaff', value: '#e8edf5' },
  fan_cham: { arc: '#aa66ff', glabel: '#aa66ff', value: '#e8edf5' },
};

let COLORS  = JSON.parse(JSON.stringify(DEFAULT_COLORS));
let USE_12H = true; // overridden by display config

// Per-printer accent colours (index 0 = first printer, 1 = second)
const PRINTER_COLS = ['#00c8ff', '#ff6020'];

// ── Colour helpers ─────────────────────────────────────────────────────────
function isColorDark(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000 < 128;
}
function lighten(hex, pct) {
  return `rgb(${Math.min(255,parseInt(hex.slice(1,3),16)+pct*2)},${Math.min(255,parseInt(hex.slice(3,5),16)+pct*2)},${Math.min(255,parseInt(hex.slice(5,7),16)+pct*2)})`;
}
function darken(hex, pct) {
  return `rgb(${Math.max(0,parseInt(hex.slice(1,3),16)-pct*2)},${Math.max(0,parseInt(hex.slice(3,5),16)-pct*2)},${Math.max(0,parseInt(hex.slice(5,7),16)-pct*2)})`;
}

// ── Display config — apply theme colours as CSS variables ─────────────────
function applyColors(display) {
  if (!display || !display.colors) return;
  const c = display.colors;
  COLORS  = Object.assign(JSON.parse(JSON.stringify(DEFAULT_COLORS)), c);
  const root   = document.documentElement;
  const isDark = isColorDark(c.bg || '#0a0c0f');
  if (c.bg)    root.style.setProperty('--bg',    c.bg);
  if (c.track) root.style.setProperty('--track', c.track);
  if (isDark) {
    root.style.setProperty('--panel', lighten(c.bg||'#0a0c0f', 8));
    root.style.setProperty('--bdr',   lighten(c.bg||'#0a0c0f', 18));
    root.style.setProperty('--text',  '#e8edf5');
    root.style.setProperty('--muted', '#3a4560');
  } else {
    root.style.setProperty('--panel', darken(c.bg||'#f0f0f0', 5));
    root.style.setProperty('--bdr',   darken(c.bg||'#f0f0f0', 15));
    root.style.setProperty('--text',  '#111111');
    root.style.setProperty('--muted', '#666666');
  }
}

async function loadDisplayConfig() {
  try {
    const res  = await fetch('/api/display');
    const data = await res.json();
    applyColors(data);
    USE_12H = data.time_format !== '24h';
  } catch(e) {}
}
loadDisplayConfig();

// ── Header clock ──────────────────────────────────────────────────────────
setInterval(() => {
  document.getElementById('clk').textContent =
    new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: USE_12H });
}, 1000);

// ── Arc gauge geometry ────────────────────────────────────────────────────
const AS = 225, AW = 270; // arc start angle, arc width

function pt(cx, cy, r, deg) {
  const a = (deg - 90) * Math.PI / 180;
  return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
}
function arcD(cx, cy, r, s, e) {
  const [x1,y1] = pt(cx,cy,r,s), [x2,y2] = pt(cx,cy,r,e);
  return `M${x1.toFixed(2)} ${y1.toFixed(2)} A${r} ${r} 0 ${((e-s)%360>180?1:0)} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}`;
}

// Colour zones: green → yellow → red (mirrors Bambu TFT logic)
function zoneCol(pct, fixed) {
  if (fixed) return fixed;
  if (pct < 0.60) return '#00e878';
  if (pct < 0.85) return '#ffcc00';
  return '#ff3344';
}

function arcSVG(val, max, tgt, fixed) {
  const cx=50, cy=54, r=38, sw=7;
  const pct = Math.min(Math.max(val / max, 0), 1);
  const col = zoneCol(pct, fixed);
  const td  = arcD(cx, cy, r, AS, AS+AW);
  const fd  = pct > 0.004 ? arcD(cx, cy, r, AS, AS+AW*pct) : '';
  // Scale tick marks at 0%, 50%, 100%
  const ticks = [0, 0.5, 1].map(t => {
    const [ox,oy] = pt(cx,cy,r+4, AS+AW*t), [ix,iy] = pt(cx,cy,r-1, AS+AW*t);
    return `<line x1="${ox.toFixed(1)}" y1="${oy.toFixed(1)}" x2="${ix.toFixed(1)}" y2="${iy.toFixed(1)}" stroke="rgba(255,255,255,.12)" stroke-width="1"/>`;
  }).join('');
  // Target temperature marker
  const tm = (tgt > 0 && tgt <= max) ? (() => {
    const p2 = Math.min(tgt/max, 1);
    const [ox,oy] = pt(cx,cy,r+5, AS+AW*p2), [ix,iy] = pt(cx,cy,r-3, AS+AW*p2);
    return `<line x1="${ox.toFixed(1)}" y1="${oy.toFixed(1)}" x2="${ix.toFixed(1)}" y2="${iy.toFixed(1)}" stroke="rgba(255,255,255,.55)" stroke-width="1.5" stroke-linecap="round"/>`;
  })() : '';
  const glow = fd ? `<path d="${fd}" fill="none" stroke="${col}" stroke-width="${sw+5}" stroke-linecap="round" opacity=".1"/>` : '';
  return `<svg viewBox="0 0 100 108" xmlns="http://www.w3.org/2000/svg">
    <path d="${td}" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="${sw}" stroke-linecap="round"/>
    ${ticks}${glow}
    ${fd ? `<path d="${fd}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"/>` : ''}
    ${tm}
  </svg>`;
}

// ── LED progress bar — 40 segments ────────────────────────────────────────
const LEDS = 40;
function ledBar(pct, col) {
  const n = Math.round(pct / 100 * LEDS);
  return Array.from({ length: LEDS }, (_, i) => {
    const on = i < n, tip = on && i === n-1;
    const s  = on ? `background:${col};box-shadow:0 0 5px ${col}70` : '';
    return `<div class="seg${on?' on':''}${tip?' tip':''}" style="${s}"></div>`;
  }).join('');
}

// ── State helpers ─────────────────────────────────────────────────────────
function stCls(s) {
  if (!s.connected) return 'offline';
  if (s.errors && s.errors.length) return 'error';
  return { RUNNING:'printing', PAUSE:'paused', FINISH:'finished', FAILED:'error' }[s.gcode_state] || 'idle';
}
function stLbl(s) {
  if (!s.connected) return 'Offline';
  return { RUNNING:'Printing', PAUSE:'Paused', FINISH:'Finished', FAILED:'Failed' }[s.gcode_state] || 'Idle';
}
function fmt(min) {
  if (!min || min <= 0) return '--';
  const h = Math.floor(min / 60), m = min % 60;
  return h ? `${h}h ${m}m` : `${m}m`;
}

// ── Filament type decoder ─────────────────────────────────────────────────
// Full-code overrides take priority; 3-char prefix used as fallback.
// GFA prefix codes observed to be PLA variants in Bambu's RFID system.
const FILAMENT_TYPE = {
  // Known full codes
  GFL99: 'PLA',      GFL96: 'PLA Silk',  GFL00: 'PLA',
  GFG99: 'PETG',     GFG00: 'PETG',      GFG02: 'PETG HF',
  GFA00: 'PLA Basic', GFA01: 'PLA Matte', GFA06: 'PLA Silk+',
  GFH99: 'ASA',      GFB99: 'PA',        GFT99: 'TPU',
  GFC99: 'PC',       GFS99: 'PVA',
  // 3-char prefix fallbacks
  GFL: 'PLA',  GFG: 'PETG', GFA: 'PLA',  GFT: 'TPU',
  GFB: 'PA',   GFC: 'PC',   GFS: 'PVA',  GFN: 'CF',
  GFH: 'ASA',  GFF: 'PA-CF', GFI: 'PAHT', GFJ: 'PC-CF',
};
function filamentShort(name, type) {
  if (name) return name.replace(/^(Bambu|Generic)\s+/i, '').slice(0, 10);
  if (type) return FILAMENT_TYPE[type] || FILAMENT_TYPE[type.slice(0, 3)] || type.slice(0, 6);
  return '';
}

// ── Print state SVG icon ──────────────────────────────────────────────────
function printIcon(s) {
  const sc = stCls(s);
  if (!s.connected)    return `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="28" stroke="#3a4560" stroke-width="3"/><line x1="20" y1="20" x2="44" y2="44" stroke="#3a4560" stroke-width="3" stroke-linecap="round"/></svg>`;
  if (sc === 'error')  return `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="28" fill="rgba(255,40,60,0.12)" stroke="#ff2840" stroke-width="2.5"/><line x1="32" y1="18" x2="32" y2="36" stroke="#ff2840" stroke-width="3.5" stroke-linecap="round"/><circle cx="32" cy="45" r="2.5" fill="#ff2840"/></svg>`;
  if (sc === 'finished')return `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="28" fill="rgba(0,200,80,0.1)" stroke="#00c850" stroke-width="2.5"/><polyline points="18,33 27,43 46,22" stroke="#00c850" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  if (sc === 'paused') return `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="28" fill="rgba(255,180,0,0.1)" stroke="#ffb400" stroke-width="2.5"/><rect x="20" y="20" width="9" height="24" rx="2" fill="#ffb400"/><rect x="35" y="20" width="9" height="24" rx="2" fill="#ffb400"/></svg>`;
  if (sc === 'printing')return `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="28" fill="rgba(0,200,255,0.08)" stroke="var(--ac)" stroke-width="2.5"/><polygon points="24,18 24,46 48,32" fill="var(--ac)"/></svg>`;
  return `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="28" stroke="#3a4560" stroke-width="2.5"/></svg>`;
}

// ── Panel renderer — builds one printer card ──────────────────────────────
function panel(s, idx) {
  const col    = idx === 0 ? '#00c8ff' : '#ff6020';
  const fancol = idx === 0 ? '#00c8ff' : '#ff8040';
  const sc     = stCls(s);
  const pct    = s.progress || 0;
  const isPrinting = sc === 'printing', isPaused = sc === 'paused';
  const isActive   = isPrinting || isPaused;

  // Offline overlay
  const offline = !s.connected ? `
    <div class="offline">
      <div class="on">${s.name}</div>
      <div class="om">Reconnecting</div>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>` : '';

  // Error strip + HMS codes with wiki links
  let errHtml = '';
  if (s.errors && s.errors.length) {
    const e = s.errors[s.errors.length-1];
    const entry = typeof e === 'object' ? {code: e.code, desc: e.msg} : {code: null, desc: e};
    const clickAttr = entry.code ? `onclick="showHmsQR(${JSON.stringify(entry)})" style="cursor:pointer"` : '';
    errHtml += `<div class="err-strip" ${clickAttr}>⚠ ${entry.desc}</div>`;
  }
  if (s.hms_errors && s.hms_errors.length)
    errHtml += `<div class="hms-strip">
      ${s.hms_errors.map((e, i) => {
        const entry = typeof e === 'object' ? e : {code: e, desc: ''};
        const descHtml = entry.desc
          ? `<span class="hms-desc">⚠ ${entry.desc}</span>`
          : `<span class="hms-desc">⚠ ${entry.code}</span>`;
        const codeHtml = entry.desc ? `<span class="hms-code">[${entry.code}]</span>` : '';
        const dismissBtn = i === 0
          ? `<button class="hms-dismiss" onclick="clearErrors('${s.id}')" title="Dismiss errors">✕</button>`
          : '';
        return `<div class="hms-strip-row"><span class="hms-entry" onclick="showHmsQR(${JSON.stringify(entry)})">${descHtml}${codeHtml}</span>${dismissBtn}</div>`;
      }).join('')}
    </div>`;
  const errStrip = errHtml;

  // AMS — grouped by unit, 4 slots each, with per-unit temp/humidity and nozzle row
  const amsSection = (() => {
    const trays = s.ams_trays || [];
    if (!trays.length) return '';

    // Group trays by AMS unit ID
    const units = {};
    trays.forEach(t => {
      const uid = t.id.split('-')[0];
      if (!units[uid]) units[uid] = [];
      units[uid].push(t);
    });

    const unitHtml = Object.keys(units).sort().map(uid => {
      const uTrays = units[uid];
      const first  = uTrays[0];
      const temp    = first?.temp         ? `${parseFloat(first.temp).toFixed(0)}\u00b0` : null;
      const hum     = first?.humidity_pct ? `RH ${first.humidity_pct}%` : (first?.humidity ? `RH ${first.humidity}` : null);
      const dryLbl  = first?.drying       ? `DRY${first.dry_remain ? ' ' + first.dry_remain : ''}` : null;
      const env     = [hum, temp, dryLbl].filter(Boolean).join(' \u00b7 ');
      // Always show 4 slots; pad missing ones with null
      const slots  = Array.from({length: 4}, (_, i) =>
        uTrays.find(t => t.id === `${uid}-${i}`) || null
      );
      return `<div class="ams-unit">
        <div class="ams-unit-hdr">
          <span class="ams-unit-lbl">AMS ${parseInt(uid)+1}${first?.drying ? ' <span class="ams-dry-badge">DRYING</span>' : ''}</span>
          ${env ? `<span class="ams-env">${env}</span>` : ''}
        </div>
        <div class="ams-trays">
          ${slots.map(t => {
            const inJob     = t && t.in_job;
            // Use tray_now-based active as the currently-feeding indicator; in_job shows all job trays subtly
            const isActive  = t && t.active;
            // state 10 = empty, state 24 = no spool/standby; also treat as empty if no filament type
            const isEmpty   = t && (t.state === 10 || t.state === 24 || (!t.type && t.state !== 11 && t.state !== 27));
            const typeLabel = !t ? '--' : isEmpty ? '' : (filamentShort('', t.type) || t.type || '');
            return t ? `
            <div class="ams-tray" title="${isEmpty ? 'Empty' : typeLabel + (t.remain>=0?' '+t.remain+'%':'')}">
              <div class="ams-arrow ${isActive?'on':inJob?'on':''}" style="color:${col};opacity:${isActive?'1':'0.45'}">${isEmpty?'':'&#9660;'}</div>
              <div class="ams-color" style="background:${isEmpty?'transparent':t.color};${
                isEmpty   ? 'opacity:0.15;border:1px dashed rgba(255,255,255,0.12);' :
                isActive  ? `border:2px solid ${col};box-shadow:0 0 6px ${col}80;` :
                inJob     ? `border:2px solid ${col};` :
                            'border:2px solid transparent;'
              }"></div>
              <div class="ams-info" style="color:${isEmpty?'var(--muted)':isActive||inJob?col:'var(--muted)'};font-weight:${isActive?'700':'400'};opacity:${isEmpty?'0.35':'1'}">
                ${isEmpty ? '--' : typeLabel + (t.remain>=0?' \u00b7 '+t.remain+'%':'')}
              </div>
            </div>` : `
            <div class="ams-tray">
              <div class="ams-arrow"></div>
              <div class="ams-color" style="background:var(--muted);opacity:0.12;border:1px dashed rgba(255,255,255,0.08);"></div>
              <div class="ams-info" style="opacity:0.3">--</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('');

    // Nozzle active filament row — show what's physically loaded in each nozzle
    const virSlots = (s.vir_slots || []).filter(vs => !vs.empty);
    const nozzleHtml = virSlots.length ? `
      <div class="ams-nozzle">
        <span class="ams-unit-lbl" style="flex-shrink:0">Nozzle</span>
        ${virSlots.map((vs, i) => {
          const label = s.vir_slots.length > 1 ? ['L','R'][i]+':&nbsp;' : '';
          const name  = filamentShort('', vs.type) || vs.type || '';
          return `<div class="ams-nozzle-slot">
            <div class="ams-nozzle-dot" style="background:${vs.color}"></div>
            <span class="ams-nozzle-lbl">${label}${name||vs.color}</span>
          </div>`;
        }).join('<span style="color:var(--muted);opacity:0.4">|</span>')}
      </div>` : '';

    return `<div class="ams-sect">${unitHtml}${nozzleHtml}</div>`;
  })();

  // ETA — arrival time of print completion
  const etaClock = s.time_remaining > 0
    ? new Date(Date.now() + s.time_remaining * 60000)
        .toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12: USE_12H })
    : '--:--';
  const etaBlock = isActive ? `
    <div class="eta-block">
      <div class="eta-time">${etaClock}</div>
      <div class="eta-label">ETA</div>
    </div>` : '';

  // Print info card
  const printCard = `
    <div class="print-card">
      <div class="thumb" id="thumb-${s.id}">${printIcon(s)}</div>
      <div class="print-info">
        <div class="print-title">${s.print_name || (isActive ? 'Printing...' : 'No active print')}</div>
        <div class="print-meta">
          <span>Layer <strong>${s.layer_current||0}</strong>/<strong>${s.layer_total||0}</strong></span>
          <span>Remaining <strong>${fmt(s.time_remaining)}</strong></span>
        </div>
        ${s.stage ? `<div class="print-stage">${s.stage}</div>` : ''}
      </div>
      ${etaBlock}
    </div>`;

  // Arc gauges (bed + chamber)
  const arcBed     = arcSVG(Math.round(s.bed_temp||0),     120, Math.round(s.bed_target||0), COLORS.bed?.arc || '#ff9944');
  const arcChamber = arcSVG(Math.round(s.chamber_temp||0),  60, 0,                           '#aa66ff');

  // Nozzle — dual bars (L/R) when extruder data available, single bar otherwise
  const nozzleCol  = COLORS.nozzle?.arc || col;
  const slots      = s.vir_slots && s.vir_slots.length >= 2 ? s.vir_slots : null;
  const nozzleTemp = Math.round(s.nozzle_temp || 0);
  const nozzleTgt  = Math.round(s.nozzle_target || 0);
  const nFPct      = Math.min(100, nozzleTemp / 300 * 100).toFixed(1);
  const nTPct      = nozzleTgt > 0 ? Math.min(100, nozzleTgt / 300 * 100).toFixed(1) : 0;
  const nozzleActiveSide = s.nozzle_active_side || null;  // 'L', 'R', or null
  const hasDualTemp = s.nozzle_temp_l != null || s.nozzle_temp_r != null;
  const nLTemp = Math.round(s.nozzle_temp_l != null ? s.nozzle_temp_l : 0);
  const nRTemp = Math.round(s.nozzle_temp_r != null ? s.nozzle_temp_r : 0);
  const nLTgt  = s.nozzle_target_l != null ? Math.round(s.nozzle_target_l) : 0;
  const nRTgt  = s.nozzle_target_r != null ? Math.round(s.nozzle_target_r) : 0;
  const dualBar = (temp, tgt, label, isActive) => {
    const fp = Math.min(100, temp / 300 * 100).toFixed(1);
    const tp = tgt > 0 ? Math.min(100, tgt / 300 * 100).toFixed(1) : 0;
    const dimmed = isActive === false;
    const barCol = dimmed ? 'var(--muted)' : nozzleCol;
    const barShadow = dimmed ? '' : `box-shadow:0 -2px 8px ${nozzleCol}55`;
    return `<div class="vg-col" style="${dimmed ? 'opacity:0.5' : ''}">
      <div style="font-size:9px;color:var(--muted);letter-spacing:1px;font-family:'Share Tech Mono',monospace">${label}${isActive ? ' *' : ''}</div>
      <div class="vg-bar">
        <div class="vg-fill" style="height:${fp}%;background:${barCol};${barShadow}"></div>
        ${tgt > 0 ? `<div class="vg-mark" style="bottom:${tp}%"></div>` : ''}
      </div>
      <div class="vg-val" style="font-size:clamp(11px,1.6vw,17px)">${temp}</div>
      <div class="vg-sub">${tgt > 0 ? '&#9658;' + tgt + '&deg;' : '&deg;C'}</div>
    </div>`;
  };

  // Fan gauge cell
  const fanCell = (lbl, val, gaugeKey, fallbackCol) => `
    <div class="gc">
      <div class="gc-lbl">${lbl}</div>
      <div class="arc-box">
        ${arcSVG(val||0, 100, 0, COLORS[gaugeKey]?.arc || fallbackCol)}
        <div class="arc-over">
          <div class="arc-v">${val||0}</div>
          <div class="arc-u">%</div>
        </div>
      </div>
    </div>`;

  // Status dot class
  const dotCls = !s.connected ? 'off'
    : (s.errors && s.errors.length) ? 'err'
    : sc === 'paused' ? 'warn' : 'ok';

  const stateOverlay = (sc === 'error' || sc === 'paused') ? (() => {
    const isErr   = sc === 'error';
    const icon    = isErr ? '⚠' : '⏸';
    const lbl     = isErr ? 'Error' : 'Paused';
    const hmsEntries = (s.hms_errors || []).map(e => {
      const entry = typeof e === 'object' ? e : {code: e, desc: ''};
      const descTxt = entry.desc ? `<div class="pnl-overlay-code-desc">${entry.desc}</div>` : '';
      return `<div class="pnl-overlay-code" onclick="showHmsQR(${JSON.stringify(entry)})">${entry.code}${descTxt}</div>`;
    });
    const printEntries = (s.errors || []).filter(e => typeof e === 'object' && e.code).map(e => {
      const entry = {code: e.code, desc: e.msg};
      return `<div class="pnl-overlay-code" onclick="showHmsQR(${JSON.stringify(entry)})"><div class="pnl-overlay-code-desc">${e.msg}</div></div>`;
    });
    const codes = [...hmsEntries, ...printEntries].join('');
    return `<div class="pnl-overlay ${sc}">
      <div class="pnl-overlay-icon">${icon}</div>
      <div class="pnl-overlay-lbl">${lbl}</div>
      ${codes ? `<div class="pnl-overlay-codes">${codes}<div class="pnl-overlay-hint">TAP CODE FOR QR</div></div>` : ''}
    </div>`;
  })() : '';

  return `
    <div class="pnl ${sc}" style="--ac:${col}">
      <div class="pnl-body">
      ${stateOverlay}
      ${offline}
      <div class="pnl-hdr">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="pnl-dot ${dotCls}"></div>
          <div class="pnl-name">${s.name}</div>
        </div>
        <div class="badge ${sc}">${stLbl(s)}</div>
      </div>
      ${printCard}
      <div class="led-sect">
        <div class="led-row1">
          <div class="led-fn">${pct}% complete</div>
          <div class="led-pct">${pct}<sup>%</sup></div>
        </div>
        <div class="led-strip">${ledBar(pct, col)}</div>
      </div>
      <div class="gg">
        <div class="gc">
          ${(() => {
            const nt = s.nozzle_type || '';
            return `<div class="gc-lbl">Nozzle${hasDualTemp ? '' : (nozzleActiveSide ? ' ' + nozzleActiveSide : '')}
              ${nt ? `<span style="font-size:9px;font-weight:400;display:block;margin-top:1px">${nt}</span>` : ''}
            </div>`;
          })()}
          ${hasDualTemp ? `
          <div class="vg-outer" style="gap:5px">
            ${dualBar(nLTemp, nLTgt, 'L', nozzleActiveSide === 'L')}
            ${dualBar(nRTemp, nRTgt, 'R', nozzleActiveSide === 'R')}
          </div>` : (() => {
            const idleNozzle = s.printing && nozzleTgt === 0;
            const barCol = idleNozzle ? 'var(--muted)' : nozzleCol;
            const barShadow = idleNozzle ? '' : `box-shadow:0 -2px 8px ${nozzleCol}55`;
            return `
          <div class="vg-outer" style="${idleNozzle ? 'opacity:0.45' : ''}">
            <div class="vg-bar">
              <div class="vg-fill" style="height:${nFPct}%;background:${barCol};${barShadow}"></div>
              ${nozzleTgt > 0 ? `<div class="vg-mark" style="bottom:${nTPct}%"></div>` : ''}
            </div>
          </div>
          <div class="vg-val" style="${idleNozzle ? 'opacity:0.45' : ''}">${nozzleTemp}</div>
          <div class="vg-sub" style="${idleNozzle ? 'opacity:0.45' : ''}">${nozzleTgt > 0 ? '&#9658;' + nozzleTgt + '&deg;' : '&deg;C'}</div>
          ${slots ? `<div class="vg-dots">
            <div class="vg-dot" title="Left nozzle"  style="background:${slots[0].color}"></div>
            <div class="vg-dot" title="Right nozzle" style="background:${slots[1].color}"></div>
          </div>` : ''}`;
          })()}
        </div>
        <div class="gc">
          <div class="gc-lbl">Bed</div>
          <div class="arc-box">
            ${arcBed}
            <div class="arc-over">
              <div class="arc-v">${Math.round(s.bed_temp||0)}</div>
              <div class="arc-u">°C</div>
              ${s.bed_target > 0 ? `<div class="arc-tgt">▶${Math.round(s.bed_target)}°</div>` : ''}
            </div>
          </div>
        </div>
        <div class="gc">
          <div class="gc-lbl">Chamber</div>
          <div class="arc-box">
            ${arcChamber}
            <div class="arc-over">
              <div class="arc-v">${Math.round(s.chamber_temp||0)}</div>
              <div class="arc-u">°C</div>
            </div>
          </div>
        </div>
        ${fanCell('Part Fan', s.fan_part,    'fan_part', fancol)}
        ${fanCell('Aux Fan',  s.fan_aux,     'fan_aux',  '#44aaff')}
        ${fanCell('Exhaust',  s.fan_chamber, 'fan_cham', '#aa66ff')}
      </div>
      ${amsSection}
      </div>
      ${errStrip}
    </div>`;
}

// ── Thumbnail cache — avoids re-fetching on every state update ────────────
const thumbCache  = {};
const thumbFailed = {};

async function loadThumb(printerId, printName) {
  const el = document.getElementById(`thumb-${printerId}`);
  if (!el) return;
  // Return cached image if same print
  if (thumbCache[printerId] === printName) {
    el.innerHTML = `<img src="${thumbCache[printerId + '_url']}" alt="preview">`;
    return;
  }
  // Skip known-failed fetches for this print
  if (thumbFailed[printerId] === printName) return;
  try {
    const res = await fetch(`/api/thumbnail/${printerId}`);
    if (res.ok && res.headers.get('content-type')?.startsWith('image')) {
      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      thumbCache[printerId]          = printName;
      thumbCache[printerId + '_url'] = url;
      if (el) el.innerHTML = `<img src="${url}" alt="preview">`;
    } else {
      thumbFailed[printerId] = printName;
    }
  } catch(e) {
    thumbFailed[printerId] = printName;
  }
}

// ── Network status — polls Surface RT WiFi signal every 30s ──────────────
async function updateNetStatus() {
  const dot   = document.getElementById('net-dot');
  const label = document.getElementById('net-label');
  try {
    const res  = await fetch('/api/network');
    const data = await res.json();
    if (data.ok && data.signal) {
      const bars = data.signal > -60 ? '▂▄▆█' : data.signal > -70 ? '▂▄▆·' : data.signal > -80 ? '▂▄··' : '▂···';
      dot.className     = `net-dot ${data.quality === 'good' ? 'ok' : data.quality === 'fair' ? 'warn' : 'err'}`;
      label.textContent = `${bars} ${data.signal}dBm`;
    } else {
      dot.className     = 'net-dot ok';
      label.textContent = 'Online';
    }
  } catch(e) {
    dot.className     = 'net-dot ok';
    label.textContent = 'Online';
  }
}
setInterval(updateNetStatus, 30000);
updateNetStatus();

// ── Battery status — polls /api/system/battery every 60s ──────────────────
async function updateBattery() {
  try {
    const res  = await fetch('/api/system/battery');
    const data = await res.json();
    const el   = document.getElementById('batt-status');
    if (!el || !data.ok) return;
    el.style.display = '';
    const pct      = data.capacity;
    const charging = data.status === 'Charging';
    const low      = pct < 20 && !charging;
    el.className   = `batt-status${charging ? ' charging' : low ? ' low' : ''}`;
    document.getElementById('batt-pct').textContent  = `${pct}%`;
    document.getElementById('batt-fill').style.width = `${pct}%`;
  } catch(e) {}
}
setInterval(updateBattery, 60000);
updateBattery();

// ── HMS QR code overlay ───────────────────────────────────────────────────
function showHmsQR(entry) {
  // entry may be {code, desc} or a legacy plain string
  const code = typeof entry === 'object' ? entry.code : entry;
  const desc = typeof entry === 'object' ? (entry.desc || '') : '';
  const url  = `https://wiki.bambulab.com/en/hms/home#${code.replace(/-/g,'_')}`;
  document.getElementById('qr-code-lbl').textContent = code;
  const descEl = document.getElementById('qr-desc-lbl');
  descEl.textContent = desc;
  descEl.style.display = desc ? '' : 'none';
  document.getElementById('qr-img').src =
    `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(url)}`;
  document.getElementById('qr-overlay').classList.add('vis');
}
function hideHmsQR() {
  document.getElementById('qr-overlay').classList.remove('vis');
  document.getElementById('qr-img').src = '';
}

// ── Clear printer errors (dismiss stale HMS codes) ───────────────────────
async function clearErrors(printerId) {
  await fetch('/api/printer/clear_errors', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({printer_id: printerId})
  });
}

// ── Main render — called on every state update ────────────────────────────
function render(states) {
  const el        = document.getElementById('printers');
  const idleClock = document.getElementById('idle-clock');
  const anyActive = states.some(s => s.connected && (s.gcode_state === 'RUNNING' || s.gcode_state === 'PAUSE'));

  // Show idle clock when no printer is actively printing
  if (anyActive) {
    idleClock.classList.remove('active');
    el.style.display = '';
  } else {
    idleClock.classList.add('active');
    el.style.display = 'none';
  }

  // Single printer mode uses wider layout
  const single = states.length === 1;
  el.style.gridTemplateColumns = single ? '1fr' : '1fr 1fr';
  el.classList.toggle('single', single);
  el.innerHTML = states.map((s, i) => panel(s, i)).join('');

  // Load thumbnails for active prints
  states.forEach(s => {
    if (s.connected && s.printing && s.print_name) loadThumb(s.id, s.print_name);
  });
}

// ── Idle clock ticker ─────────────────────────────────────────────────────
function tickIdleClock() {
  const now  = new Date();
  document.getElementById('idle-time-display').textContent =
    now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: USE_12H });
  document.getElementById('idle-date-display').textContent =
    now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}
setInterval(tickIdleClock, 1000);
tickIdleClock();

// ── Weather display ───────────────────────────────────────────────────────
async function updateWeather() {
  try {
    const w = await fetch('/api/weather').then(r => r.json());
    const el = document.getElementById('idle-weather');
    if (!w || !w.temp) { el.style.display = 'none'; return; }
    document.getElementById('wx-temp').textContent  = `${w.temp}\u00b0${w.unit}`;
    document.getElementById('wx-desc').textContent  = w.desc;
    document.getElementById('wx-range').textContent = `H:${w.high}\u00b0  L:${w.low}\u00b0  Humidity:${w.humidity}%`;
    el.style.display = 'flex';
  } catch(e) {}
}
updateWeather();
setInterval(updateWeather, 1800000); // refresh every 30 min

// ── Token expiry warning ──────────────────────────────────────────────────
async function checkTokenExpiry() {
  try {
    const data = await fetch('/api/token_expiry').then(r => r.json());
    const bar  = document.getElementById('token-warn-bar');
    const msg  = document.getElementById('token-warn-msg');
    const warn = data.filter(p => p.days_left !== null && p.days_left <= 30);
    if (!warn.length) { bar.style.display = 'none'; return; }
    const parts = warn.map(p => {
      if (p.days_left <= 0)  return `${p.name}: token EXPIRED`;
      if (p.days_left <= 7)  return `${p.name}: token expires in ${p.days_left}d`;
      return `${p.name}: token expires in ${p.days_left} days`;
    });
    msg.textContent = '⚠ ' + parts.join('  ·  ');
    bar.style.display = 'flex';
  } catch(e) {}
}
checkTokenExpiry();

// ── WebSocket + initial state load ───────────────────────────────────────
const socket = io();
socket.on('state_update', render);
fetch('/api/state').then(r => r.json()).then(render).catch(() => {});
</script>
